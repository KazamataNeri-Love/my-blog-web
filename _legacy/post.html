<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>阅读文章</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main:         hsl(0, 0%, 0%);
            --bg-surface:      hsl(240, 4%, 16%);
            --bg-elevated:     hsl(240, 5%, 26%);
            --text-main:       hsl(210, 6%, 93%);
            --text-sub:        hsl(240, 5%, 65%);
            --text-muted:      hsl(240, 5%, 46%);
            --accent:          hsl(212, 92%, 58%);
            --border:          hsl(240, 5%, 26%);
            --radius-sm:       0.375rem;
            --radius-md:       0.75rem;
            --ease:            cubic-bezier(0.2, 0, 0, 1);
            --dur-fast:        150ms;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            max-width: 780px;
            margin: 0 auto;
            padding: 0 24px 80px;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial,
                         "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            color: var(--text-main);
            background: var(--bg-main);
            min-height: 100vh;
        }

        /* Top bar (KunUI docs-style) */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }
        .back-link {
            color: var(--accent);
            font-weight: 500;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: opacity var(--dur-fast) var(--ease);
        }
        .back-link:hover { opacity: 0.8; }

        /* Article content (KunUI prose) */
        .article-content {
            line-height: 1.75;
            color: var(--text-main);
            font-size: 15px;
        }
        .article-content h1, .article-content h2, .article-content h3 {
            color: hsl(0, 0%, 100%);
            margin-top: 28px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .article-content h1 { font-size: 1.7em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .article-content h2 { font-size: 1.35em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .article-content h3 { font-size: 1.1em; }
        .article-content a { color: var(--accent); text-decoration: none; }
        .article-content a:hover { text-decoration: underline; }
        .article-content p { margin-bottom: 12px; }
        .article-content blockquote {
            padding: 10px 16px;
            color: var(--text-sub);
            border-left: 3px solid var(--accent);
            margin: 12px 0;
            background: var(--bg-surface);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }
        .article-content code {
            padding: 2px 6px;
            font-size: 0.88em;
            background: hsla(210, 6%, 93%, 0.08);
            border-radius: var(--radius-sm);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }
        .article-content pre {
            padding: 16px;
            overflow: auto;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            margin: 12px 0;
        }
        .article-content pre code { background: transparent; padding: 0; }
        .article-content table { border-spacing: 0; border-collapse: collapse; width: 100%; margin: 12px 0; }
        .article-content th, .article-content td { padding: 7px 12px; border: 1px solid var(--border); }
        .article-content th { background: var(--bg-surface); font-weight: 600; }
        .article-content img { max-width: 100%; height: auto; border-radius: var(--radius-sm); display: block; margin: 12px 0; }
        .article-content hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
        .article-content ul, .article-content ol { padding-left: 20px; margin-bottom: 12px; }
        .article-content li { margin-bottom: 4px; }

        /* File cards */
        .article-content .file-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            margin: 14px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            transition: border-color var(--dur-fast) var(--ease);
        }
        .article-content .file-card:hover { border-color: hsla(240, 5%, 65%, 0.3); }
        .article-content .file-name { font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        .article-content .file-info { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .article-content .file-note { font-size: 11px; color: var(--text-sub); background: var(--bg-elevated); padding: 2px 7px; border-radius: var(--radius-sm); }
        .article-content .file-download {
            font-size: 12px; padding: 4px 10px;
            background: var(--bg-elevated); border-radius: var(--radius-sm);
            color: var(--text-main); cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 5px;
            transition: all var(--dur-fast) var(--ease);
        }
        .article-content .file-download:hover { background: var(--accent); color: hsl(0, 0%, 100%); }

        body { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
        body::-webkit-scrollbar { width: 6px; background: transparent; }
        body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }
        body::-webkit-scrollbar-thumb:hover { background: var(--bg-elevated); }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> 返回文章列表</a>
    </div>

    <div id="content" class="article-content">正在加载文章...</div>

    <script type="module">
        import { getPost, downloadFile } from "./js/api.js";
        
        const params = new URLSearchParams(location.search);
        const path = params.get("f") ? decodeURIComponent(params.get("f")) : null;

        if(path) {
            loadPost();
        } else {
            document.getElementById("content").innerText = "未指定文章";
        }

        async function loadPost() {
            try {
                const text = await getPost(path);
                const div = document.getElementById("content");
                div.innerHTML = marked.parse(text);
                
                div.querySelectorAll('.file-download').forEach(btn => {
                    btn.onclick = () => downloadFile(btn.getAttribute('data-path'));
                });

                document.title = path.split('/').pop().replace('.md','') || "阅读文章";

            } catch (e) {
                document.getElementById("content").innerText = "文章加载失败: " + e.message;
            }
        }
    </script>
</body>
</html>
