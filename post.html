<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>阅读文章</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: hsl(0, 0%, 0%);
            --bg-surface: hsl(240, 4%, 16%);
            --text-main: hsl(210, 6%, 93%);
            --text-sub: hsl(240, 5%, 65%);
            --accent-color: hsl(212, 92%, 58%);
            --border-color: hsl(240, 5%, 26%);
            --radius-sm: 0.375rem;
            --radius-md: 0.75rem;
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
            --dur-fast: 150ms;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            max-width: 800px; margin: 0 auto; padding: 32px 24px 80px;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.8; color: var(--text-main); background: var(--bg-main);
            min-height: 100vh;
        }

        .nav {
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 14px;
            display: flex;
            align-items: center;
        }

        .back-link {
            text-decoration: none; color: var(--accent-color);
            font-weight: 500; font-size: 14px;
            display: inline-flex; align-items: center; gap: 6px;
            transition: opacity var(--dur-fast) var(--ease-standard);
        }
        .back-link:hover { opacity: 0.8; }

        #content {
            line-height: 1.8; color: var(--text-main); font-size: 15px;
        }

        #content h1, #content h2, #content h3 {
            color: hsl(0, 0%, 100%); margin-top: 28px; margin-bottom: 16px;
            font-weight: 600;
        }
        #content h1 { font-size: 1.8em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
        #content h2 { font-size: 1.4em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
        #content a { color: var(--accent-color); text-decoration: none; }
        #content a:hover { text-decoration: underline; }
        #content blockquote {
            padding: 10px 16px; color: var(--text-sub);
            border-left: 0.25em solid var(--accent-color);
            margin: 16px 0; background: var(--bg-surface);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }
        #content code {
            padding: 0.2em 0.4em; font-size: 0.9em;
            background-color: hsla(210, 6%, 93%, 0.1);
            border-radius: var(--radius-sm); font-family: inherit;
        }
        #content pre {
            padding: 16px; overflow: auto; background: var(--bg-surface);
            border-radius: var(--radius-md); border: 1px solid var(--border-color);
            margin: 16px 0;
        }
        #content pre code { background: transparent; padding: 0; }
        #content table { border-spacing: 0; border-collapse: collapse; width: 100%; margin: 16px 0; }
        #content th, #content td { padding: 8px 13px; border: 1px solid var(--border-color); }
        #content th { background: var(--bg-surface); }
        #content img { max-width: 100%; height: auto; border-radius: var(--radius-sm); display: block; margin: 16px 0; }

        /* File card styles */
        #content .file-card {
            background: var(--bg-surface); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 14px 18px; margin: 16px 0;
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
        }
        #content .file-name { font-weight: 600; color: var(--accent-color); display: flex; align-items: center; gap: 8px; }
        #content .file-info { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        #content .file-note {
            font-size: 11px; color: var(--text-sub);
            background: hsl(240, 5%, 26%); padding: 3px 8px;
            border-radius: var(--radius-sm);
        }
        #content .file-download {
            color: var(--text-main); font-size: 12px; padding: 5px 12px;
            background: hsl(240, 5%, 26%); border-radius: var(--radius-md);
            cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            transition: all var(--dur-fast) var(--ease-standard);
        }
        #content .file-download:hover { background: var(--accent-color); color: hsl(0, 0%, 100%); }

        body { scrollbar-width: thin; scrollbar-color: var(--border-color) transparent; }
        body::-webkit-scrollbar { width: 6px; }
        body::-webkit-scrollbar-track { background: transparent; }
        body::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 9999px; }
        body::-webkit-scrollbar-thumb:hover { background: hsl(240, 5%, 34%); }
    </style>
</head>
<body>
    <div class="nav">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> 返回文章列表</a>
    </div>

    <div id="content">正在加载文章...</div>

    <script type="module">
        import { getPost, downloadFile } from "./js/api.js";
        
        const params = new URLSearchParams(location.search);
        const path = params.get("f") ? decodeURIComponent(params.get("f")) : null;

        if(path) {
            loadPost();
        } else {
            document.getElementById("content").innerText = "未指定文章";
        }

        async function loadPost() {
            try {
                const text = await getPost(path);
                const div = document.getElementById("content");
                div.innerHTML = marked.parse(text);
                
                div.querySelectorAll('.file-download').forEach(btn => {
                    btn.onclick = () => downloadFile(btn.getAttribute('data-path'));
                });

                document.title = path.split('/').pop().replace('.md','') || "阅读文章";

            } catch (e) {
                document.getElementById("content").innerText = "文章加载失败: " + e.message;
            }
        }
    </script>
</body>
</html>
