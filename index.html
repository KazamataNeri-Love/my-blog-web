<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的知识库</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* ============================================================
         * KunUI Design Tokens (Dark Mode) — adapted from @kungal/ui-tokens
         * ============================================================ */
        :root {
            --bg-main:         hsl(0, 0%, 0%);
            --bg-surface:      hsl(240, 4%, 16%);
            --bg-elevated:     hsl(240, 5%, 26%);
            --bg-sidebar:      hsl(240, 6%, 10%);
            --text-main:       hsl(210, 6%, 93%);
            --text-sub:        hsl(240, 5%, 65%);
            --text-muted:      hsl(240, 5%, 46%);
            --accent:          hsl(212, 92%, 58%);
            --border:          hsl(240, 5%, 26%);
            --border-subtle:   hsla(240, 5%, 65%, 0.2);
            --success:         hsl(146, 79%, 44%);
            --radius-sm:       0.375rem;
            --radius-md:       0.75rem;
            --radius-lg:       1rem;
            --ease:            cubic-bezier(0.2, 0, 0, 1);
            --dur-fast:        150ms;
            --dur-base:        250ms;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica,
                         Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
        }

        input, button, select, textarea { font-family: inherit; }

        a { text-decoration: none; color: inherit; }

        /* ============================================================
         * LAYOUT — KunUI docs structure
         * ============================================================ */
        .app-wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- Top Bar (sticky, glass) --- */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            background: hsla(0, 0%, 0%, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-shrink: 0;
        }

        .top-bar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }
        .top-bar-brand .accent { color: var(--accent); }

        .top-bar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .top-bar-link {
            font-size: 13px;
            color: var(--text-sub);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: var(--radius-sm);
            transition: all var(--dur-fast) var(--ease);
        }
        .top-bar-link:hover {
            color: var(--text-main);
            background: var(--bg-elevated);
        }

        /* --- Layout Row --- */
        .layout-row {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* --- Sidebar (sticky, w-60, scrollable) --- */
        .sidebar {
            width: 240px;
            flex-shrink: 0;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 57px;
            height: calc(100vh - 57px);
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }
        .sidebar { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        .sidebar-section {
            padding: 12px 12px 4px;
        }
        .sidebar-section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding: 0 8px;
        }

        /* Search */
        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            transition: border-color var(--dur-fast) var(--ease);
        }
        .search-box:focus-within { border-color: var(--accent); }
        .search-box i { color: var(--text-muted); font-size: 13px; }
        .search-box input {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 100%;
            outline: none;
            font-size: 13px;
        }
        .search-box input::placeholder { color: var(--text-muted); }

        /* Sidebar Nav */
        .sidebar-nav {
            display: flex;
            flex-direction: column;
            list-style: none;
            padding: 0 4px;
        }
        .sidebar-nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            font-size: 13px;
            color: var(--text-sub);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--dur-fast) var(--ease);
            text-decoration: none;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }
        .sidebar-nav-item:hover {
            background: var(--bg-surface);
            color: var(--text-main);
        }
        .sidebar-nav-item.active {
            color: var(--accent);
            background: hsla(212, 92%, 58%, 0.1);
            font-weight: 500;
        }
        .sidebar-nav-item i { width: 16px; text-align: center; font-size: 13px; }

        /* File tree in sidebar */
        .file-tree { list-style: none; padding: 0; }
        .file-tree .nested-ul { display: none; padding-left: 0; list-style: none; }
        .file-tree .folder-open > .nested-ul { display: block; }

        .file-tree .folder-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px 5px 14px;
            font-size: 13px;
            color: var(--text-sub);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--dur-fast) var(--ease);
        }
        .file-tree .folder-item:hover { background: var(--bg-surface); color: var(--text-main); }
        .file-tree .folder-item .folder-arrow {
            font-size: 10px;
            width: 10px;
            transition: transform var(--dur-fast) var(--ease);
        }
        .file-tree .folder-open > .folder-item .folder-arrow { transform: rotate(90deg); color: var(--accent); }
        .file-tree .folder-item .folder-icon { color: hsl(37, 74%, 44%); font-size: 12px; }

        .file-tree .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 10px 5px 28px;
            font-size: 13px;
            color: var(--text-sub);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--dur-fast) var(--ease);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-tree .file-item:hover { background: var(--bg-surface); color: var(--text-main); }
        .file-tree .file-item.active { color: var(--accent); background: hsla(212, 92%, 58%, 0.1); font-weight: 500; }
        .file-tree .file-item i { font-size: 12px; width: 14px; text-align: center; flex-shrink: 0; }

        /* Sort controls */
        .sort-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px 4px;
            position: relative;
        }
        .sort-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
        }
        .sort-trigger {
            cursor: pointer;
            padding: 3px 5px;
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            font-size: 12px;
            transition: all var(--dur-fast) var(--ease);
        }
        .sort-trigger:hover { background: var(--bg-elevated); color: var(--text-main); }

        .sort-popup {
            position: absolute;
            right: 8px;
            top: 32px;
            min-width: 140px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            box-shadow: 0 8px 24px hsla(0, 0%, 0%, 0.5);
            z-index: 100;
            display: none;
            overflow: hidden;
        }
        .sort-popup.show { display: block; }
        .sort-option {
            padding: 8px 12px;
            font-size: 12px;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background var(--dur-fast) var(--ease);
        }
        .sort-option:hover { background: hsla(240, 5%, 65%, 0.1); }
        .sort-option.active { color: var(--accent); font-weight: 500; }
        .sort-option .check-icon { opacity: 0; font-size: 10px; }
        .sort-option.active .check-icon { opacity: 1; }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* ============================================================
         * MAIN CONTENT — KunUI docs content area
         * ============================================================ */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px 48px;
            min-width: 0;
        }
        .main-content::-webkit-scrollbar { width: 6px; }
        .main-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }
        .main-content { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        /* --- Article Header (KunHeader-inspired) --- */
        .doc-header {
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .doc-title {
            font-size: 24px;
            font-weight: 600;
            color: hsl(0, 0%, 100%);
            line-height: 1.3;
            margin-right: 20px;
        }
        .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-edit {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-sub);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--dur-fast) var(--ease);
            text-decoration: none;
        }
        .btn-edit:hover { background: var(--bg-elevated); color: var(--text-main); border-color: var(--text-muted); }

        .doc-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-muted);
            align-items: center;
        }

        /* --- Empty state --- */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-state-icon { font-size: 48px; opacity: 0.15; margin-bottom: 16px; }
        .empty-state h2 { font-size: 18px; font-weight: 500; color: var(--text-sub); margin-bottom: 8px; }
        .empty-state p { font-size: 13px; }

        /* ============================================================
         * MARKDOWN PROSE — KunUI-inspired content styling
         * ============================================================ */
        .markdown-body {
            line-height: 1.75;
            color: var(--text-main);
            font-size: 14px;
            max-width: 100%;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            color: hsl(0, 0%, 100%);
            margin-top: 28px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        .markdown-body h1 { font-size: 1.7em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.35em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.1em; }
        .markdown-body a { color: var(--accent); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body p { margin-bottom: 12px; }
        .markdown-body blockquote {
            padding: 10px 16px;
            color: var(--text-sub);
            border-left: 3px solid var(--accent);
            margin: 12px 0;
            background: var(--bg-surface);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }
        .markdown-body code {
            padding: 2px 6px;
            font-size: 0.88em;
            background: hsla(210, 6%, 93%, 0.08);
            border-radius: var(--radius-sm);
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }
        .markdown-body pre {
            padding: 16px;
            overflow: auto;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            margin: 12px 0;
        }
        .markdown-body pre code { background: transparent; padding: 0; }
        .markdown-body table {
            border-spacing: 0;
            border-collapse: collapse;
            width: 100%;
            margin: 12px 0;
        }
        .markdown-body th, .markdown-body td { padding: 7px 12px; border: 1px solid var(--border); }
        .markdown-body th { background: var(--bg-surface); font-weight: 600; }
        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-sm);
            display: block;
            margin: 12px 0;
        }
        .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
        .markdown-body ul, .markdown-body ol { padding-left: 20px; margin-bottom: 12px; }
        .markdown-body li { margin-bottom: 4px; }

        .img-wrap { position: relative; display: inline-block; }
        .img-size-badge {
            position: absolute;
            right: 6px;
            bottom: 6px;
            background: hsla(0, 0%, 0%, 0.65);
            color: hsl(0, 0%, 100%);
            font-size: 10px;
            padding: 2px 6px;
            border-radius: var(--radius-sm);
            display: none;
            pointer-events: none;
        }
        .img-wrap:hover .img-size-badge { display: block; }

        /* --- File Card (KunCard-inspired) --- */
        .file-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            margin: 14px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            transition: border-color var(--dur-fast) var(--ease);
        }
        .file-card:hover { border-color: var(--border-subtle); }
        .file-name { font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-info { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .file-note { font-size: 11px; color: var(--text-sub); background: var(--bg-elevated); padding: 2px 7px; border-radius: var(--radius-sm); }
        .file-download {
            font-size: 12px;
            padding: 4px 10px;
            background: var(--bg-elevated);
            border-radius: var(--radius-sm);
            color: var(--text-main);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all var(--dur-fast) var(--ease);
        }
        .file-download:hover { background: var(--accent); color: hsl(0, 0%, 100%); }

        /* ============================================================
         * RESPONSIVE
         * ============================================================ */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
                position: fixed;
                top: 57px;
                left: 0;
                height: calc(100vh - 57px);
                z-index: 40;
                box-shadow: 0 8px 32px hsla(0, 0%, 0%, 0.5);
                width: 260px;
            }
            .sidebar.open { display: flex; }
            .main-content { padding: 20px; }
        }
        
        .sort-popup {
            position: absolute; right: 10px; top: 35px;
            background-color: var(--surface-elevated); border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 1000;
            min-width: 150px; display: none; overflow: hidden;
            backdrop-filter: blur(12px);
        }
        .sort-popup.show { display: block; }

        .sort-option {
            padding: 10px 14px; font-size: 12px; color: var(--text-main); cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            transition: background var(--dur-fast) var(--ease-standard);
        }
        .sort-option:hover { background-color: hsla(240, 5%, 65%, 0.1); }
        .sort-option.active { color: var(--accent-color); font-weight: 600; }
        .sort-option .check-icon { opacity: 0; font-size: 12px; }
        .sort-option.active .check-icon { opacity: 1; }
        /* ----------------------- */

        .sidebar-footer {
            padding: 14px 16px; border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-between;
            color: var(--text-sub); font-size: 11px;
        }

        /* --- 主内容区 --- */
        .main-content {
            flex: 1; overflow-y: auto; padding: 40px 60px;
            position: relative;
        }

        .doc-header { margin-bottom: 32px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .doc-title { font-size: 28px; font-weight: 600; color: hsl(0, 0%, 100%); line-height: 1.3; margin-right: 20px;}
        .actions { display: flex; gap: 10px; }
        .btn {
            background-color: var(--hover-bg); color: var(--text-main); border: 1px solid var(--border-color);
            padding: 6px 14px; border-radius: var(--radius-md); font-size: 12px; cursor: pointer;
            text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
            transition: all var(--dur-fast) var(--ease-standard);
        }
        .btn:hover { background-color: var(--surface-elevated); border-color: hsl(240, 5%, 65%); }

        .doc-meta { display: flex; gap: 20px; color: var(--text-sub); font-size: 12px; align-items: center; }

        .markdown-body {
            line-height: 1.7;
            color: hsl(210, 6%, 93%);
            max-width: none;
            width: 100%;
            font-size: 14px;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: hsl(0, 0%, 100%); margin-top: 24px; margin-bottom: 16px; font-weight: 600; }
        .markdown-body h1 { font-size: 2em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
        .markdown-body a { color: var(--accent-color); text-decoration: none; }
        .markdown-body a:hover { text-decoration: underline; }
        .markdown-body blockquote { padding: 10px 15px; color: hsl(240, 5%, 65%); border-left: 0.25em solid var(--blockquote-border);
            margin: 0 0 16px 0; background: var(--surface-card);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
        .markdown-body code { padding: 0.2em 0.4em; font-size: 85%;
            background-color: hsla(210, 6%, 93%, 0.1); border-radius: var(--radius-sm);
            font-family: inherit; }
        .markdown-body pre { padding: 16px; overflow: auto; background-color: var(--surface-card);
            border-radius: var(--radius-md); border: 1px solid var(--border-color); }
        .markdown-body pre code { background-color: transparent; padding: 0; }
        .markdown-body table { border-spacing: 0; border-collapse: collapse; width: 100%; margin-bottom: 16px; display: block; overflow: auto;}
        .markdown-body table th, .markdown-body table td { padding: 6px 13px; border: 1px solid var(--border-color); }
        .markdown-body table th { background-color: var(--surface-card); }
        .markdown-body img { max-width: 100%; height: auto; border-radius: var(--radius-sm); background-color: hsl(0, 0%, 100%); display: block; margin: 12px 0; }
        .img-wrap { position: relative; display: inline-block; }
        .img-size-badge {
            position: absolute; right: 6px; bottom: 6px;
            background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; padding: 3px 6px; border-radius: 4px;
            display: none; pointer-events: none;
        }
        .img-wrap:hover .img-size-badge { display: block; }

        /* 文件卡片样式 — KunUI Card-inspired */
        .file-card {
            background: var(--surface-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 14px 18px; margin: 16px 0;
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
            transition: all var(--dur-fast) var(--ease-standard);
        }
        .file-card:hover { border-color: hsla(240, 5%, 65%, 0.3); }
        .file-name { font-weight: 600; color: var(--accent-color); display: flex; align-items: center; gap: 8px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
        .file-info { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .file-note { font-size: 11px; color: var(--text-sub); background: var(--surface-elevated); padding: 3px 8px; border-radius: var(--radius-sm); white-space: nowrap; }
        .file-download {
            color: var(--text-main); font-size: 12px; padding: 5px 12px;
            background: var(--surface-elevated); border-radius: var(--radius-md);
            cursor: pointer; text-decoration: none; display: inline-flex; align-items: center;
            gap: 6px; transition: all var(--dur-fast) var(--ease-standard); white-space: nowrap;
        }
        .file-download:hover { background: var(--accent-color); color: hsl(0, 0%, 100%); }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 9999px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--surface-elevated); }

        /* Scrollbar for Firefox */
        .sidebar, .main-content { scrollbar-width: thin; scrollbar-color: var(--border-color) transparent; }

        @media (max-width: 768px) {
            .sidebar { display: none; position: absolute; height: 100%; z-index: 100; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
            .sidebar.open { display: flex; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">

        <!-- ============ TOP BAR (KunUI docs-style) ============ -->
        <header class="top-bar">
            <div class="top-bar-brand">
                <span>📚</span>
                <span>我的<span class="accent">知识库</span></span>
            </div>
            <div class="top-bar-actions">
                <a href="editor.html" target="_blank" class="top-bar-link">
                    <i class="fa-solid fa-pen"></i> 新建
                </a>
                <a href="https://github.com/KazamataNeri-Love/my-blog-web" target="_blank" class="top-bar-link">
                    <i class="fa-brands fa-github"></i> GitHub
                </a>
            </div>
        </header>

        <!-- ============ LAYOUT ROW ============ -->
        <div class="layout-row">

            <!-- ============ SIDEBAR (KunUI docs-style) ============ -->
            <aside class="sidebar" id="sidebar">

                <div class="sidebar-section">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" placeholder="搜索文章...">
                    </div>
                </div>

                <div class="sidebar-section">
                    <p class="sidebar-section-title">导航</p>
                    <ul class="sidebar-nav" id="sidebar-nav-static">
                        <li>
                            <button class="sidebar-nav-item" onclick="showHome()">
                                <i class="fa-solid fa-house"></i> 首页
                            </button>
                        </li>
                        <li>
                            <a href="editor.html" target="_blank" class="sidebar-nav-item">
                                <i class="fa-solid fa-plus" style="color: var(--success);"></i> 新建贴文
                            </a>
                        </li>
                    </ul>
                </div>

                <div class="sort-wrapper">
                    <span class="sort-label"><i class="fa-regular fa-file-lines"></i> 贴文列表</span>
                    <div class="sort-trigger" onclick="event.stopPropagation(); toggleSortMenu()" title="排序方式">
                        <i class="fa-solid fa-arrow-down-short-wide"></i>
                    </div>
                    <div id="sort-menu" class="sort-popup">
                        <div class="sort-option ${currentSortMode === 'date' ? 'active' : ''}" onclick="applySort('date')">
                            <span>📅 按时间</span> <i class="fa-solid fa-check check-icon"></i>
                        </div>
                        <div class="sort-option ${currentSortMode === 'title' ? 'active' : ''}" onclick="applySort('title')">
                            <span>Aa 按标题</span> <i class="fa-solid fa-check check-icon"></i>
                        </div>
                    </div>
                </div>

                <ul class="file-tree" id="sidebar-list">
                    <li style="text-align:center; color:var(--text-muted); padding:20px; font-size:13px;">
                        <i class="fa-solid fa-spinner fa-spin"></i> 加载中...
                    </li>
                </ul>

                <div class="sidebar-footer">
                    <span><i class="fa-solid fa-database"></i> GitHub Tree</span>
                    <span id="version-tag">v3.0</span>
                </div>
            </aside>

            <!-- ============ MAIN CONTENT (KunUI docs-style) ============ -->
            <main class="main-content">
                <div class="doc-header" id="header-area" style="display:none;">
                    <div class="header-top">
                        <h1 class="doc-title" id="article-title">无标题</h1>
                        <div class="header-actions">
                            <a id="btn-edit" href="#" class="btn-edit" target="_blank">
                                <i class="fa-solid fa-pen"></i> 编辑
                            </a>
                        </div>
                    </div>
                    <div class="doc-meta">
                        <span id="article-date"><i class="fa-regular fa-calendar"></i> -</span>
                        <span><i class="fa-regular fa-user"></i> Admin</span>
                        <span id="article-file" style="opacity:0.6;">filename.md</span>
                    </div>
                </div>

                <div id="empty-state" class="empty-state">
                    <div class="empty-state-icon"><i class="fa-regular fa-compass"></i></div>
                    <h2>> 欢迎来到知识库 <</h2>
                    <p>点击左侧目录查看文章，或者搜索。</p>
                </div>

                <div id="article-body" class="markdown-body"></div>
            </main>

        </div><!-- /layout-row -->
    </div><!-- /app-wrapper -->

    <script type="module">
        import { fetchFileTree, getPost, downloadFile } from "./js/api.js";
        
        // DOM 元素引用
        const sidebarList = document.getElementById("sidebar-list");
        const searchInput = document.getElementById("search-input");
        const headerArea = document.getElementById("header-area");
        const emptyState = document.getElementById("empty-state");
        const articleBody = document.getElementById("article-body");
        
        const uiTitle = document.getElementById("article-title");
        const uiDate = document.getElementById("article-date");
        const uiFile = document.getElementById("article-file");
        const btnEdit = document.getElementById("btn-edit");

        let allFiles = []; 
        let currentSortMode = 'date'; // 默认按时间倒序

        // --- 初始化 ---
        async function init() {
            await loadSidebar();
            
            const params = new URLSearchParams(location.search);
            const path = params.get("f");
            
            if (path) {
                loadContent(decodeURIComponent(path));
            } else {
                showHome();
            }
        }
        init();

        // --- 加载侧边栏数据 (Tree) ---
        async function loadSidebar() {
            try {
                allFiles = await fetchFileTree();
                const tree = buildTree(allFiles);
                renderSidebarTree(tree);
            } catch (e) {
                console.error(e);
                sidebarList.innerHTML = `<li style="color:hsl(339, 90%, 61%); padding:15px">❌ 加载失败: ${e.message}</li>`;
            }
        }

        // --- 核心：路径转嵌套对象 ---
        function buildTree(files) {
            const root = {};
            files.forEach(file => {
                if (file.type !== 'blob' && file.type !== 'tree') return; 
                if (!file.path.endsWith('.md') && file.type === 'blob') return; 

                const parts = file.path.replace(/^posts\//, '').split('/');
                let current = root;
                parts.forEach((part, index) => {
                    if (!current[part]) {
                        current[part] = {
                            name: part,
                            path: (index === parts.length - 1 && file.type === 'blob') ? file.path : null,
                            children: {}
                        };
                    }
                    current = current[part].children;
                });
            });
            return root;
        }

        // --- 核心：递归渲染树 (KunUI nav-style) ---
        function renderSidebarTree(treeData) {
            sidebarList.innerHTML = "";

            // 递归目录
            const container = document.createDocumentFragment();
            createTreeNodes(treeData, container, 1);
            sidebarList.appendChild(container);

            updateActiveState();
        }

        function createTreeNodes(nodes, parentEl, level) {
            // 排序逻辑
            const keys = Object.keys(nodes).sort((a, b) => {
                const nodeA = nodes[a];
                const nodeB = nodes[b];
                const isFolderA = Object.keys(nodeA.children).length > 0 && !nodeA.path;
                const isFolderB = Object.keys(nodeB.children).length > 0 && !nodeB.path;
                
                // 文件夹始终置顶
                if (isFolderA && !isFolderB) return -1;
                if (!isFolderA && isFolderB) return 1;

                if (currentSortMode === 'date') {
                    return b.localeCompare(a, 'zh-CN');
                } else {
                    const nameA = a.replace(/^\d{4}-\d{1,2}-\d{1,2}-/, "");
                    const nameB = b.replace(/^\d{4}-\d{1,2}-\d{1,2}-/, "");
                    return nameA.localeCompare(nameB, 'zh-CN');
                }
            });

            keys.forEach(key => {
                const node = nodes[key];
                const isFolder = Object.keys(node.children).length > 0 && !node.path;
                
                const li = document.createElement("li");
                let displayName = node.name.replace(".md", "").replace(/^\d{4}-\d{1,2}-\d{1,2}-/, "");
                
                if (isFolder) {
                    li.innerHTML = `
                        <div class="folder-item" onclick="toggleFolder(this)">
                            <i class="fa-solid fa-caret-right folder-arrow"></i>
                            <i class="fa-regular fa-folder folder-icon"></i>
                            <span>${displayName}</span>
                        </div>
                    `;
                    const ul = document.createElement("ul");
                    ul.className = "nested-ul";
                    createTreeNodes(node.children, ul, level + 1);
                    li.appendChild(ul);
                } else {
                    li.innerHTML = `
                        <div class="file-item" data-path="${node.path}" onclick="handlePostClick('${node.path}')">
                            <i class="fa-regular fa-file-lines"></i>
                            <span>${displayName}</span>
                        </div>
                    `;
                }
                parentEl.appendChild(li);
            });
        }

        // --- 排序与交互 ---
        window.toggleSortMenu = () => {
            const menu = document.getElementById("sort-menu");
            if(menu) {
                menu.classList.toggle("show");
                if (menu.classList.contains("show")) {
                    setTimeout(() => document.addEventListener('click', closeSortMenuOutside), 0);
                }
            }
        };

        function closeSortMenuOutside(e) {
            const menu = document.getElementById("sort-menu");
            if (menu && !menu.contains(e.target)) {
                menu.classList.remove("show");
                document.removeEventListener('click', closeSortMenuOutside);
            }
        }

        window.applySort = (mode) => {
            currentSortMode = mode;
            const tree = buildTree(allFiles);
            renderSidebarTree(tree);
        };

        window.toggleFolder = (el) => {
            el.parentElement.classList.toggle("folder-open");
        };

        window.showHome = () => {
            const url = new URL(window.location);
            url.searchParams.delete('f');
            window.history.pushState({}, '', url);
            headerArea.style.display = "none";
            articleBody.innerHTML = "";
            emptyState.style.display = "block";
            updateActiveState();
        };

        window.handlePostClick = (path) => {
            loadContent(path);
        };

        // --- 加载内容 ---
        async function loadContent(path) {
            headerArea.style.display = "none";
            emptyState.style.display = "none";
            articleBody.innerHTML = `<div style="text-align:center; padding:50px; color:var(--text-muted)"><i class="fa-solid fa-circle-notch fa-spin fa-2x"></i></div>`;
            
            const newUrl = `${window.location.pathname}?f=${encodeURIComponent(path)}`;
            window.history.pushState({ path: newUrl }, '', newUrl);
            updateActiveState();

            try {
                let text = await getPost(path);
                const lines = text.split('\n');
                const firstLine = lines[0].trim();
                let renderText = text;

                if (firstLine.startsWith('# ')) {
                    uiTitle.innerText = firstLine.replace(/^#\s+/, '').trim();
                    renderText = lines.slice(1).join('\n');
                } else {
                    const filename = path.split('/').pop();
                    uiTitle.innerText = filename.replace(".md", "").replace(/^\d{4}-\d{1,2}-\d{1,2}-/, "");
                }

                articleBody.innerHTML = marked.parse(renderText);
                uiFile.innerText = path;
                btnEdit.href = `editor.html?edit=${encodeURIComponent(path)}`;
                headerArea.style.display = "block";

                // 下载按钮处理
                articleBody.querySelectorAll('.file-download').forEach(btn => {
                    btn.onclick = (e) => {
                        e.preventDefault();
                        downloadFile(btn.getAttribute('data-path'));
                    };
                });

                // 处理图片：从 title 或 data-width 读取宽度设定并应用；添加悬浮尺寸徽章和双击编辑宽度
                articleBody.querySelectorAll('img').forEach(img => {
                    // avoid processing if already wrapped
                    if (img.dataset._processed === '1') return;

                    const title = img.getAttribute('title') || '';
                    let widthSpec = img.dataset.width || '';
                    const m = title.match(/(?:w|width)\s*[:=]\s*(\d+%?|\d+px|1|orig|original)/i);
                    if (!widthSpec && m) widthSpec = m[1];
                    if (!widthSpec && img.hasAttribute('data-width')) widthSpec = img.getAttribute('data-width');

                    function applyWidth(spec) {
                        if (!spec) {
                            img.style.width = '';
                            img.style.maxWidth = '100%';
                            img.dataset.width = '';
                            img.setAttribute('title', '');
                            return;
                        }
                        if (spec === '1' || /^orig(?:inal)?$/i.test(spec)) {
                            img.style.width = 'auto';
                            img.style.maxWidth = 'none';
                        } else if (/^\d+%$/.test(spec) || /^\d+$/.test(spec)) {
                            if (/^\d+$/.test(spec)) spec = spec + '%';
                            img.style.width = spec;
                            img.style.maxWidth = '100%';
                        } else if (/px$/.test(spec)) {
                            img.style.width = spec;
                            img.style.maxWidth = 'none';
                        } else {
                            img.style.width = spec;
                        }
                        img.dataset.width = spec;
                        img.setAttribute('title', 'width=' + spec);
                    }

                    applyWidth(widthSpec);

                    // wrap
                    const wrap = document.createElement('span');
                    wrap.className = 'img-wrap';
                    img.parentNode.insertBefore(wrap, img);
                    wrap.appendChild(img);
                    const badge = document.createElement('span');
                    badge.className = 'img-size-badge';
                    badge.innerText = img.dataset.width || '';
                    wrap.appendChild(badge);

                    img.addEventListener('dblclick', () => {
                        const cur = img.dataset.width || '';
                        const input = prompt('设置图片宽度：输入数字带%（如50%）或像素(px)（如400px），输入1或orig表示原始像素，留空恢复默认', cur);
                        if (input === null) return;
                        const val = input.trim();
                        if (val === '') {
                            applyWidth('');
                            badge.innerText = '';
                        } else {
                            let spec = val;
                            if (/^\d+$/.test(spec)) spec = spec + '%';
                            applyWidth(spec);
                            badge.innerText = img.dataset.width;
                        }
                    });

                    img.onerror = () => { img.style.border = '1px solid #555'; img.alt += ' (图片加载失败)'; };
                    img.loading = 'lazy';
                    img.dataset._processed = '1';
                });

            } catch (e) {
                console.error(e);
                articleBody.innerHTML = `<div style="color:hsl(339, 90%, 61%); padding:20px;">❌ 加载失败: ${e.message}</div>`;
            }
        }

        function updateActiveState() {
            document.querySelectorAll('.sidebar-nav-item.active').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.file-item.active').forEach(el => el.classList.remove('active'));
            const params = new URLSearchParams(location.search);
            const currentPath = params.get("f");

            if (!currentPath) {
                const homeBtn = document.querySelector('.sidebar-nav-item');
                if(homeBtn) homeBtn.classList.add("active");
            } else {
                const activeItem = document.querySelector(`.file-item[data-path="${decodeURIComponent(currentPath)}"]`);
                if(activeItem) {
                    activeItem.classList.add("active");
                    // 自动展开父文件夹
                    let parent = activeItem.parentElement.parentElement;
                    while (parent && parent.classList.contains('nested-ul')) {
                        parent.parentElement.classList.add('folder-open');
                        parent = parent.parentElement.parentElement;
                    }
                }
            }
        }

        // --- 搜索 ---
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            if (!keyword) {
                const tree = buildTree(allFiles);
                renderSidebarTree(tree);
                return;
            }
            sidebarList.innerHTML = "";
            const matched = allFiles.filter(f => 
                f.type === 'blob' && f.path.endsWith('.md') && 
                f.path.toLowerCase().includes(keyword)
            );

            if (matched.length === 0) {
                sidebarList.innerHTML = "<li style='padding:15px; color:var(--text-muted)'>无搜索结果</li>";
                return;
            }

            matched.forEach(file => {
                const li = document.createElement("li");
                const displayName = file.path.replace("posts/", "").replace(".md", "");
                li.innerHTML = `
                    <div class="file-item" data-path="${file.path}" onclick="handlePostClick('${file.path}')">
                        <i class="fa-regular fa-file-lines"></i>
                        <span>${displayName}</span>
                    </div>
                `;
                sidebarList.appendChild(li);
            });
        });

    </script>
</body>
</html>
