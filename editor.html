<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>编辑器</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 基础设置 (等宽字体) --- */
        body { 
            margin: 0; padding: 0; height: 100vh;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            background: #fff; color: #333;
            display: flex; flex-direction: column;
        }
        
        * { box-sizing: border-box; }
        a { text-decoration: none; }

        /* --- 顶部导航栏 --- */
        .top-bar {
            padding: 10px 20px;
            border-bottom: 1px solid #d0d7de;
            background: #f6f8fa;
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }

        .back-link { color: #0969da; font-size: 14px; display: inline-flex; align-items: center; gap: 5px;}
        
        .header-inputs { flex: 1; margin: 0 20px; display: flex; gap: 10px; align-items: center; }
        .header-inputs label { font-weight: bold; font-size: 14px; white-space: nowrap; }
        .header-inputs input {
            flex: 1; padding: 8px 12px; font-size: 14px;
            border: 1px solid #d0d7de; border-radius: 6px; font-family: inherit;
        }
        .header-inputs input:focus { outline: 2px solid #0969da; border-color: transparent; }

        .header-actions { display: flex; gap: 10px; }

        /* --- 主体区域 (Flex 布局) --- */
        .main-container {
            flex: 1; display: flex; overflow: hidden; position: relative;
        }

        /* 左侧：编辑器 */
        .editor-pane {
            flex: 1; display: flex; flex-direction: column;
            border-right: 1px solid #d0d7de;
            transition: width 0.3s;
            min-width: 0; /* 防止 flex 子元素溢出 */
        }

        /* 工具栏 */
        .toolbar {
            padding: 8px 15px; border-bottom: 1px solid #d0d7de;
            background: #fff; display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
        }
        .tool-btn {
            background: white; border: 1px solid #d0d7de; padding: 4px 10px;
            border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;
            color: #24292f; font-family: inherit; display: flex; align-items: center; gap: 5px;
        }
        .tool-btn:hover { background: #f3f4f6; border-color: #8b949e; }
        .tool-btn.active { background: #eef3f8; color: #0969da; border-color: #0969da; }
        .tool-sep { width: 1px; height: 20px; background: #d0d7de; margin: 0 5px; }

        textarea {
            flex: 1; width: 100%; resize: none; border: none; padding: 20px;
            font-family: inherit; font-size: 14px; line-height: 1.6; outline: none;
            overflow-y: auto; background: #fff;
        }

        /* 右侧：预览区 */
        .preview-pane {
            flex: 1; overflow-y: auto; padding: 40px;
            background: #191919; /* 深色背景 */
            display: none; /* 默认隐藏，单栏模式下通过 toggler 控制 */
            border-left: 1px solid #333;
        }

        /* 预览内容样式 (深色模式) */
        .markdown-body { line-height: 1.8; color: #d4d4d4; font-size: 14px; max-width: 100%; }
        .markdown-body h1, .markdown-body h2 { color: #fff; border-bottom: 1px solid #333; margin-top: 20px; }
        .markdown-body a { color: #3794ff; text-decoration: none; }
        .markdown-body blockquote { border-left: 0.25em solid #3794ff; background: #222; color: #999; padding: 10px; }
        .markdown-body code { background-color: rgba(110,118,129,0.4); font-family: inherit; padding: 2px 5px; border-radius: 4px; }
        .markdown-body pre { background-color: #161b22; border: 1px solid #30363d; padding: 16px; overflow: auto; border-radius: 6px; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin: 15px 0; }
        .markdown-body th, .markdown-body td { border: 1px solid #30363d; padding: 6px 13px; }
        .markdown-body img { max-width: 100%; border-radius: 4px; background: #fff; display: block; margin: 10px 0; }
        .img-wrap { position: relative; display: inline-block; }
        .img-size-badge {
            position: absolute; right: 6px; bottom: 6px;
            background: rgba(0,0,0,0.6); color: #fff; font-size: 11px; padding: 3px 6px; border-radius: 4px;
            display: none; pointer-events: none;
        }
        .img-wrap:hover .img-size-badge { display: block; }

        /* --- 文件卡片样式 --- */
        .file-card {
            background: #21262d; 
            border: 1px solid #30363d; 
            border-radius: 6px;
            padding: 12px 16px; 
            margin: 15px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .file-name { 
            font-weight: 600; 
            color: #3794ff; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .file-note {
            font-size: 12px;
            color: #8b949e;
            background: #30363d;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .file-download {
            color: #e0e0e0; 
            font-size: 13px; 
            padding: 4px 10px;
            background: #30363d; 
            border-radius: 4px; 
            cursor: pointer; 
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }
        .file-download:hover { 
            background: #3794ff; 
            color: white; 
        }

        /* --- 底部状态栏 --- */
        .status-bar {
            padding: 5px 20px; background: #f6f8fa; border-top: 1px solid #d0d7de;
            font-size: 12px; color: #57606a; display: flex; justify-content: space-between;
        }

        /* --- 按钮样式 --- */
        .btn-primary { 
            background: #2da44e; color: white; border: none; padding: 6px 16px; 
            border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit;
        }
        .btn-primary:hover { background: #2c974b; }
        .btn-primary:disabled { background: #94d3a2; cursor: wait; }

        /* --- 模态框 --- */
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); z-index: 999; justify-content: center; align-items: center; }
        .modal { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); width: 400px; max-width: 90%; }
        .modal h3 { margin-top: 0; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        #img-preview-box { 
            width: 100%; height: 200px; background: #f6f8fa; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px dashed #d0d7de; border-radius: 6px; margin-bottom: 15px; 
        }
        #img-preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .modal-input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #d0d7de; border-radius: 4px; box-sizing: border-box; }
        .modal-label { display:block; font-size:12px; font-weight:bold; margin-bottom:5px; color:#555; }
        .modal-footer { text-align: right; margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px; }
        
        /* 列表弹窗 */
        #file-list { list-style: none; padding: 0; max-height: 300px; overflow-y: auto; border: 1px solid #eee; }
        #file-list li { padding: 8px; border-bottom: 1px solid #f0f0f0; cursor: pointer; display: flex; align-items: center; font-size: 13px; }
        #file-list li:hover { background: #f6f8fa; }
    </style>
</head>
<body>

    <!-- 顶部栏 -->
    <div class="top-bar">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> 返回列表</a>
        
        <div class="header-inputs">
            <label>路径/标题:</label>
            <input type="text" id="post-title" placeholder="例如: 笔记/Vue/第一课">
        </div>

        <div class="header-actions">
            <button id="saveBtn" class="btn-primary"><i class="fa-solid fa-floppy-disk"></i> 保存</button>
        </div>
    </div>

    <!-- 主体：编辑器 + 预览 -->
    <div class="main-container" id="main-container">
        
        <!-- 左侧编辑区 -->
        <div class="editor-pane" id="editor-pane">
            <div class="toolbar">
                <button class="tool-btn" onclick="insertMD('**', '**')"><b>B</b></button>
                <button class="tool-btn" onclick="insertMD('*', '*')"><i>I</i></button>
                <button class="tool-btn" onclick="insertMD('# ', '')">H1</button>
                <button class="tool-btn" onclick="insertMD('## ', '')">H2</button>
                <div class="tool-sep"></div>
                <button class="tool-btn" onclick="insertTable()"><i class="fa-solid fa-table"></i></button>
                <button class="tool-btn" onclick="insertMD('> ', '')"><i class="fa-solid fa-quote-right"></i></button>
                <button class="tool-btn" onclick="insertMD('\n---\n', '')"><i class="fa-solid fa-ruler-horizontal"></i></button>
                <div class="tool-sep"></div>
                <button class="tool-btn" onclick="triggerFileSelect()" title="上传图片"><i class="fa-regular fa-image"></i> 图片</button>
                <button class="tool-btn" id="openFileBtn" title="插入仓库内文件"><i class="fa-solid fa-paperclip"></i> 文件</button>
                <button class="tool-btn" id="openExtLinkBtn" title="插入GitHub Release或网盘链接"><i class="fa-solid fa-link"></i> 外部/网盘</button>
                
                <input type="file" id="img-upload-input" accept="image/*" style="display:none">

                <button class="tool-btn" id="btn-toggle-split" style="margin-left: auto;" onclick="toggleSplitMode()">
                    <i class="fa-solid fa-columns"></i> 分栏预览
                </button>
            </div>
            
            <textarea id="content" placeholder="在此撰写 Markdown... (Ctrl+S 保存)"></textarea>
        </div>

        <!-- 右侧预览区 -->
        <div class="preview-pane" id="preview-pane">
            <div id="preview-content" class="markdown-body"></div>
        </div>

    </div>

    <!-- 底部状态 -->
    <div class="status-bar">
        <span id="status-text">准备就绪</span>
        <span id="word-count">0 字</span>
    </div>

    <!-- 模态框 -->
    <div id="img-modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3>插入图片</h3>
            <div id="img-preview-box"><span style="color:#999">预览区</span></div>
            <label class="modal-label">Github Token:</label>
            <input type="password" id="upload-token" class="modal-input" placeholder="输入 Token">
            <label class="modal-label">图片宽度（可选）:</label>
            <input type="text" id="img-width-input" class="modal-input" placeholder="例如: 50% 或 400px 或 orig (原始)">
            <div class="modal-footer">
                <button class="tool-btn" onclick="closeImgModal()">取消</button>
                <button class="btn-primary" id="btn-confirm-upload">上传并插入</button>
            </div>
        </div>
    </div>
    
    <div id="file-modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3>选择仓库文件</h3>
            <div id="current-path" style="font-size:12px;color:#666;margin-bottom:5px">/</div>
            <ul id="file-list">加载中...</ul>
            <div class="modal-footer">
                <button class="tool-btn" onclick="document.getElementById('file-modal-overlay').style.display='none'">关闭</button>
            </div>
        </div>
    </div>
    
    <div id="ext-link-overlay" class="modal-overlay">
        <div class="modal">
            <h3>插入外部/Release 资源</h3>
            <label class="modal-label">资源显示名称:</label>
            <input type="text" id="ext-name" class="modal-input" placeholder="例如: 游戏完整版 v1.0.zip">
            <label class="modal-label">下载链接 (URL):</label>
            <input type="text" id="ext-url" class="modal-input" placeholder="https://github.com/.../releases/.../file.zip">
            <label class="modal-label">提取码/备注 (可选):</label>
            <input type="text" id="ext-note" class="modal-input" placeholder="例如: 提取码 1234 或 解压密码: none">
            <div class="modal-footer">
                <button class="tool-btn" onclick="document.getElementById('ext-link-overlay').style.display='none'">取消</button>
                <button class="btn-primary" onclick="insertExtLink()">确认插入</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { savePost, getPost, listDir, uploadImage, downloadFile } from "./js/api.js";

        // DOM 元素
        const titleInput = document.getElementById("post-title");
        const contentArea = document.getElementById("content");
        const previewPane = document.getElementById("preview-pane");
        const previewContent = document.getElementById("preview-content");
        const btnSplit = document.getElementById("btn-toggle-split");
        const statusText = document.getElementById("status-text");
        const wordCount = document.getElementById("word-count");
        
        let isSplitMode = false;
        const params = new URLSearchParams(location.search);
        const editPath = params.get("edit") ? decodeURIComponent(params.get("edit")) : null;

        // --- 初始化 ---
        async function init() {
            if (editPath) {
                statusText.innerText = `正在编辑: ${editPath}`;
                try {
                    const fullText = await getPost(editPath);
                    titleInput.value = editPath.replace(/^posts\//, '').replace('.md', '');
                    contentArea.value = fullText;
                    updatePreview();
                } catch(e) { alert("读取失败: " + e.message); }
            } else {
                statusText.innerText = "新建文章 (可在标题框输入 文件夹/文件名)";
            }
            toggleSplitMode();
        }
        init();

        // --- 分栏与渲染 ---
        window.toggleSplitMode = () => {
            isSplitMode = !isSplitMode;
            if (isSplitMode) {
                previewPane.style.display = "block";
                btnSplit.classList.add("active");
                btnSplit.innerHTML = `<i class="fa-solid fa-table-columns"></i> 关闭分栏`;
                updatePreview();
            } else {
                previewPane.style.display = "none";
                btnSplit.classList.remove("active");
                btnSplit.innerHTML = `<i class="fa-solid fa-columns"></i> 分栏预览`;
            }
        };

        contentArea.addEventListener('input', () => {
            wordCount.innerText = `${contentArea.value.length} 字`;
            if (isSplitMode) updatePreview();
        });

        function updatePreview() {
            const rawMarkdown = contentArea.value;
            previewContent.innerHTML = marked.parse(rawMarkdown);
            
            previewContent.querySelectorAll('img').forEach(img => {
                img.onerror = () => { img.style.border = "1px solid red"; img.alt += " (失败)"; };
            });
            previewContent.querySelectorAll('.file-download').forEach(btn => {
                btn.onclick = (e) => {
                    e.preventDefault(); e.stopPropagation();
                    downloadFile(btn.getAttribute('data-path'));
                };
            });
            // apply image width metadata handling in preview
            try { if (typeof processPreviewImages === 'function') processPreviewImages(previewContent); } catch(e) { console.error(e); }
        }

        contentArea.addEventListener('scroll', () => {
            if (!isSplitMode) return;
            const percentage = contentArea.scrollTop / (contentArea.scrollHeight - contentArea.offsetHeight);
            previewPane.scrollTop = percentage * (previewPane.scrollHeight - previewPane.offsetHeight);
        });

        // --- 外部链接插入 (已修复缩进问题) ---
        const extModal = document.getElementById("ext-link-overlay");
        document.getElementById("openExtLinkBtn").onclick = () => {
            document.getElementById("ext-name").value = ""; document.getElementById("ext-url").value = "";
            document.getElementById("ext-note").value = ""; extModal.style.display = "flex";
        };
        
        window.insertExtLink = () => {
            const name = document.getElementById("ext-name").value.trim();
            const url = document.getElementById("ext-url").value.trim();
            const note = document.getElementById("ext-note").value.trim();
            if (!name || !url) return alert("名称和链接不能为空");
            let noteHtml = note ? `<span class="file-note">${note}</span>` : "";
            // 关键：无缩进模板字符串
const fileCardHtml = `<div class="file-card">
<span class="file-name"><i class="fa-solid fa-globe"></i> ${name}</span>
<div class="file-info">
${noteHtml}
<a class="file-download" href="javascript:void(0)" data-path="${url}" onclick="event.stopPropagation()">
<i class="fa-solid fa-cloud-arrow-down"></i> 下载
</a>
</div>
</div>`;
            window.insertMD(`\n${fileCardHtml}\n`, "");
            extModal.style.display = "none";
        };

        // --- 仓库文件列表 (已修复缩进问题) ---
        let currentPath = "";
        document.getElementById("openFileBtn").onclick = () => {
            document.getElementById("file-modal-overlay").style.display = "flex";
            loadFiles("");
        };
        async function loadFiles(path) {
            currentPath = path;
            document.getElementById("current-path").innerText = path || "/";
            const listEl = document.getElementById("file-list");
            listEl.innerHTML = "<li>加载中...</li>";
            const items = await listDir(path);
            listEl.innerHTML = "";
            if(path) {
                const li = document.createElement("li"); li.innerHTML = "🔙 返回上级";
                li.onclick = () => { const parts = currentPath.split('/'); parts.pop(); loadFiles(parts.join('/')); };
                listEl.appendChild(li);
            }
            items.forEach(item => {
                const li = document.createElement("li");
                li.innerHTML = item.type === 'dir' ? `📂 ${item.name}` : `📄 ${item.name}`;
                li.onclick = () => {
                    if(item.type === 'dir') loadFiles(item.path);
                    else {
                        // 关键：无缩进模板字符串
const fileCardHtml = `<div class="file-card">
<span class="file-name"><i class="fa-solid fa-file-lines"></i> ${item.name}</span>
<div class="file-info">
<a class="file-download" href="javascript:void(0)" data-path="${item.path}" onclick="event.stopPropagation()">
<i class="fa-solid fa-arrow-down"></i> 下载
</a>
</div>
</div>`;
                        window.insertMD(`\n${fileCardHtml}\n`, "");
                        document.getElementById("file-modal-overlay").style.display = 'none';
                    }
                };
                listEl.appendChild(li);
            });
        }

        // --- 图片上传 ---
        const imgInput = document.getElementById("img-upload-input");
        const imgModal = document.getElementById("img-modal-overlay");
        const imgPreviewBox = document.getElementById("img-preview-box");
        let selectedImgFile = null;

        window.triggerFileSelect = () => {
            if(!titleInput.value.trim() && !editPath) return alert("请先输入路径/标题");
            imgInput.click();
        };

        imgInput.addEventListener("change", () => {
            if (!imgInput.files[0]) return;
            selectedImgFile = imgInput.files[0];
            const reader = new FileReader();
            reader.onload = (e) => imgPreviewBox.innerHTML = `<img src="${e.target.result}" style="max-height:100%">`;
            reader.readAsDataURL(selectedImgFile);
            imgModal.style.display = "flex";
            const savedToken = localStorage.getItem("github_token");
            if(savedToken) document.getElementById("upload-token").value = savedToken;
        });

        window.closeImgModal = () => { imgModal.style.display = "none"; imgInput.value = ""; selectedImgFile = null; };

        document.getElementById("btn-confirm-upload").onclick = async function() {
            const token = document.getElementById("upload-token").value.trim();
            if(!token) return alert("请输入Token");
            localStorage.setItem("github_token", token);
            this.innerText = "上传中..."; this.disabled = true;

            try {
                const inputVal = titleInput.value.trim();
                const folderName = inputVal.split('/').pop() || "Untitled"; 
                const url = await uploadImage(selectedImgFile, folderName, token);
                // 读取宽度输入并规范化
                const widthInput = document.getElementById('img-width-input').value.trim();
                let widthSpec = '';
                if (widthInput) {
                    if (/^\d+$/.test(widthInput)) widthSpec = widthInput + '%';
                    else widthSpec = widthInput;
                }

                // 插入 Markdown，若有宽度则放在 title 中，index 会解析 title 中的 width 元数据
                const titleAttr = widthSpec ? ` "width=${widthSpec}"` : '';
                window.insertMD(`\n![${selectedImgFile.name}](${url}${titleAttr})\n`, "");
                if(isSplitMode) updatePreview();
                closeImgModal();
            } catch(e) {
                alert("上传失败: " + e.message);
            } finally {
                this.innerText = "上传并插入"; this.disabled = false;
            }
        };

        // 在预览中应用图片宽度元数据并显示徽章（与 index 解析逻辑保持一致）
        function processPreviewImages(container) {
            container.querySelectorAll('img').forEach(img => {
                if (img.dataset._processed) return;
                const title = img.getAttribute('title') || '';
                let widthSpec = img.dataset.width || '';
                const m = title.match(/(?:w|width)\s*[:=]\s*(\d+%?|\d+px|1|orig|original)/i);
                if (!widthSpec && m) widthSpec = m[1];
                if (!widthSpec && img.hasAttribute('data-width')) widthSpec = img.getAttribute('data-width');

                function applyWidth(spec) {
                    if (!spec) { img.style.width = ''; img.style.maxWidth = '100%'; img.dataset.width = ''; img.setAttribute('title', ''); return; }
                    if (spec === '1' || /^orig(?:inal)?$/i.test(spec)) { img.style.width = 'auto'; img.style.maxWidth = 'none'; }
                    else if (/^\d+%$/.test(spec) || /^\d+$/.test(spec)) { if (/^\d+$/.test(spec)) spec = spec + '%'; img.style.width = spec; img.style.maxWidth = '100%'; }
                    else if (/px$/.test(spec)) { img.style.width = spec; img.style.maxWidth = 'none'; }
                    else { img.style.width = spec; }
                    img.dataset.width = spec; img.setAttribute('title', 'width=' + spec);
                }

                applyWidth(widthSpec);

                // wrap and badge
                const wrap = document.createElement('span'); wrap.className = 'img-wrap';
                img.parentNode.insertBefore(wrap, img); wrap.appendChild(img);
                const badge = document.createElement('span'); badge.className = 'img-size-badge'; badge.innerText = img.dataset.width || '';
                wrap.appendChild(badge);
                img.addEventListener('dblclick', () => {
                    const cur = img.dataset.width || '';
                    const input = prompt('设置图片宽度：输入数字带%（如50%）或像素(px)（如400px），输入1或orig表示原始像素，留空恢复默认', cur);
                    if (input === null) return;
                    const val = input.trim();
                    if (val === '') { applyWidth(''); badge.innerText = ''; }
                    else { let spec = val; if (/^\d+$/.test(spec)) spec = spec + '%'; applyWidth(spec); badge.innerText = img.dataset.width; }
                });

                img.onerror = () => { img.style.border = '1px solid #555'; img.alt += ' (图片加载失败)'; };
                img.loading = 'lazy';
                img.dataset._processed = '1';
            });
        }

        // --- 保存 ---
        document.getElementById("saveBtn").onclick = async function() {
            let inputVal = titleInput.value.trim();
            const body = contentArea.value;
            if(!inputVal) return alert("请输入路径/标题");

            let token = localStorage.getItem("github_token");
            if (!token) token = prompt("请输入 Token:");
            if (!token) return;
            localStorage.setItem("github_token", token);

            this.disabled = true; this.innerHTML = "保存中...";
            
            try {
                let fullPath = inputVal;
                if (!fullPath.startsWith('posts/')) fullPath = 'posts/' + fullPath;
                if (!fullPath.endsWith('.md')) fullPath = fullPath + '.md';

                await savePost(fullPath, body, token);
                alert("保存成功!");
                if (window.opener && !window.opener.closed) window.opener.location.reload();
                window.location.href = `index.html?f=${encodeURIComponent(fullPath)}`;
            } catch(e) {
                alert("保存失败: " + e.message);
                this.disabled = false;
                this.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> 保存`;
            }
        };

        window.insertMD = (prefix, suffix) => {
            const start = contentArea.selectionStart; const end = contentArea.selectionEnd; const text = contentArea.value;
            contentArea.value = text.substring(0, start) + prefix + text.substring(start, end) + suffix + text.substring(end);
            contentArea.focus(); contentArea.selectionStart = start + prefix.length; contentArea.selectionEnd = end + prefix.length;
            if(isSplitMode) updatePreview();
        };
        window.insertTable = () => window.insertMD('\n| 表头1 | 表头2 |\n| --- | --- |\n| 内容1 | 内容2 |\n', '');
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); document.getElementById("saveBtn").click(); }
        });
    </script>
</body>
</html>
